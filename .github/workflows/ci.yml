name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libc6-dev

      - name: Download modules
        run: go mod download

      - name: Build
        env:
          CGO_ENABLED: "1"
        run: go build ./...

      - name: Vet
        env:
          CGO_ENABLED: "1"
        run: go vet ./...

      - name: Test
        env:
          CGO_ENABLED: "1"
        run: go test ./...

  docker:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/blocstor/bloc-manager:latest
            ${{ startsWith(github.ref, 'refs/tags/v') && format('ghcr.io/blocstor/bloc-manager:{0}', github.ref_name) || '' }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            cc: gcc
            apt_packages: "gcc libc6-dev"
          - arch: arm64
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
            apt_packages: "gcc-aarch64-linux-gnu libc6-dev-arm64-cross"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Download modules
        run: go mod download

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: go build -o bloc-manager ./cmd/manager

      - name: Install nfpm
        run: |
          curl -fsSL https://github.com/goreleaser/nfpm/releases/download/v2.38.0/nfpm_2.38.0_Linux_x86_64.tar.gz \
            | tar -xz nfpm
          sudo mv nfpm /usr/local/bin/nfpm

      - name: Package
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          sed 's/arch: amd64/arch: ${{ matrix.arch }}/' nfpm.yaml > nfpm-build.yaml
          nfpm package --config nfpm-build.yaml --packager deb --target bloc-manager_${{ github.ref_name }}_${{ matrix.arch }}.deb
          nfpm package --config nfpm-build.yaml --packager rpm --target bloc-manager_${{ github.ref_name }}_${{ matrix.arch }}.rpm

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bloc-manager_${{ github.ref_name }}_${{ matrix.arch }}.deb
            bloc-manager_${{ github.ref_name }}_${{ matrix.arch }}.rpm
